apiVersion: v2
name: pii-proxy
description: >
  Deploys the PII Proxy stack — an Envoy reverse proxy paired with an ext_proc
  PII-scrubbing sidecar. All HTTP response bodies passing through Envoy are
  automatically scanned and redacted by a Presidio/spaCy NLP pipeline before
  they reach the client.
