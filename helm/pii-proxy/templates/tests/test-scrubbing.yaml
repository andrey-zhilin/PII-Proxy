apiVersion: v1
kind: Pod
metadata:
  name: {{ include "pii-proxy.fullname" . }}-test-scrubbing
  labels:
    {{- include "pii-proxy.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: scrubbing-test
      image: curlimages/curl:8.6.0
      command:
        - sh
        - -c
        - |
          set -e
          TARGET="http://{{ include "pii-proxy.fullname" . }}:{{ .Values.service.port }}/"
          echo "Testing PII scrubbing at $TARGET"
          RESPONSE=$(curl -sf -X POST "$TARGET" \
            -H "Content-Type: text/plain" \
            -d "My name is Jane Smith and her email is jane@example.com")
          echo "Response: $RESPONSE"
          echo "$RESPONSE" | grep -q "<PERSON>" || \
            { echo "FAIL: <PERSON> not found in response"; exit 1; }
          echo "$RESPONSE" | grep -q "<EMAIL_ADDRESS>" || \
            { echo "FAIL: <EMAIL_ADDRESS> not found in response"; exit 1; }
          echo "PASS: PII scrubbing verified"
