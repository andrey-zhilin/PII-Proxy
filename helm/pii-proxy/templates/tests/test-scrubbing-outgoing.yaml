{{- if eq .Values.mode "outgoing-proxy" }}
apiVersion: v1
kind: Pod
metadata:
  name: {{ include "pii-proxy.fullname" . }}-test-outgoing
  labels:
    {{- include "pii-proxy.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: outgoing-test
      image: curlimages/curl:8.6.0
      command:
        - sh
        - -c
        - |
          set -e
          {{- if .Values.tls.enabled }}
          SCHEME="https"
          PORT={{ .Values.service.httpsPort }}
          CURL_OPTS="-k"
          {{- else }}
          SCHEME="http"
          PORT={{ .Values.service.port }}
          CURL_OPTS=""
          {{- end }}
          TARGET="${SCHEME}://{{ include "pii-proxy.fullname" . }}:${PORT}/api/public/ingestion"
          echo "Testing outgoing-proxy at $TARGET"

          # Test 1: Proxy accepts POST and returns a response (may be 5xx if upstream is unreachable — that's OK)
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" $CURL_OPTS -X POST "$TARGET" \
            -H "Content-Type: application/json" \
            -d '{"batch":[{"type":"trace-create","body":{"name":"helm-test","input":{"msg":"no pii here"}}}]}' \
            --max-time 30 || echo "000")
          echo "HTTP status: $HTTP_CODE"

          # The proxy must be reachable and respond (not connection-refused or timeout)
          if [ "$HTTP_CODE" = "000" ]; then
            echo "FAIL: proxy unreachable (connection refused or timeout)"
            exit 1
          fi

          # Accept 2xx (upstream reachable) or 5xx (upstream unreachable but proxy is working)
          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 600 ]; then
            echo "PASS: proxy responded with HTTP $HTTP_CODE"
          else
            echo "FAIL: unexpected HTTP status $HTTP_CODE"
            exit 1
          fi

          # Test 2: Verify ext_proc is in the request path by checking Envoy is listening
          HEALTH_CODE=$(curl -s -o /dev/null -w "%{http_code}" $CURL_OPTS "${SCHEME}://{{ include "pii-proxy.fullname" . }}:${PORT}/" --max-time 10 || echo "000")
          if [ "$HEALTH_CODE" = "000" ]; then
            echo "FAIL: proxy not listening on ${SCHEME} port ${PORT}"
            exit 1
          fi
          echo "PASS: proxy listener reachable (HTTP $HEALTH_CODE)"
{{- end }}
