apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "pii-proxy.fullname" . }}-envoy-config
  labels:
    {{- include "pii-proxy.labels" . | nindent 4 }}
data:
  envoy.yaml: |
    static_resources:
      listeners:
        - name: listener_0
          address:
            socket_address: { address: 0.0.0.0, port_value: {{ .Values.envoy.listenPort }} }
          filter_chains:
            - filters:
                - name: envoy.filters.network.http_connection_manager
                  typed_config:
                    "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                    codec_type: AUTO
                    stat_prefix: ingress_http
                    route_config:
                      name: local_route
                      virtual_hosts:
                        - name: local_service
                          domains: ["*"]
                          routes:
                            - match: { prefix: "/" }
                              route:
                                cluster: downstream_service
                    http_filters:
                      - name: envoy.filters.http.ext_proc
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.ext_proc.v3.ExternalProcessor
                          grpc_service:
                            envoy_grpc:
                              cluster_name: ext_proc_cluster
                          # Privacy-First (constitution Principle I):
                          # MUST remain false — Envoy returns 5xx on scrub failure,
                          # never forwards unredacted PII to the client.
                          failure_mode_allow: false
                          processing_mode:
                            request_header_mode: SKIP
                            response_header_mode: SKIP
                            request_body_mode: NONE
                            response_body_mode: BUFFERED
                      - name: envoy.filters.http.router
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
      clusters:
        - name: ext_proc_cluster
          connect_timeout: 0.25s
          type: LOGICAL_DNS
          lb_policy: ROUND_ROBIN
          typed_extension_protocol_options:
            envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
              "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
              explicit_http_config:
                http2_protocol_options: {}
          load_assignment:
            cluster_name: ext_proc_cluster
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          # Always localhost — gRPC is pod-local, never exposed outside the pod.
                          address: 127.0.0.1
                          port_value: {{ .Values.extProc.grpcPort }}
        - name: downstream_service
          connect_timeout: 0.25s
          type: LOGICAL_DNS
          lb_policy: ROUND_ROBIN
          load_assignment:
            cluster_name: downstream_service
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: {{ required "upstream.host is required. Set it to your upstream service hostname." .Values.upstream.host }}
                          port_value: {{ .Values.upstream.port }}
